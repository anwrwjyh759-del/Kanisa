<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة الكنيسة</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap');

:root{
  --bg-deep:#0b1533;
  --bg-panel:#131f4d;
  --gold:#d4af37;
  --gold-soft:#f0d78c;
  --cream:#f4ecd8;
  --gem-1:#7ec8ff;
  --gem-2:#1c5fb8;
  --gem-3:#0a2f6e;
  --warn:#e63946;
  --ok:#3fbf7f;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(212,175,55,0.08), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(30,90,180,0.15), transparent 45%),
    var(--bg-deep);
  color:var(--cream);
  font-family:'Cairo', sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  overflow-x:hidden;
}

.stars{
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1.5px 1.5px at 50% 70%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 30% 90%, rgba(255,255,255,0.3), transparent);
  background-repeat:repeat;
  background-size:400px 400px;
}

.card{
  position:relative; z-index:1;
  width:100%; max-width:520px;
  background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
  border:1px solid rgba(212,175,55,0.35);
  border-radius:20px;
  padding:36px 30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter:blur(6px);
}

.eyebrow{
  text-align:center; color:var(--gold-soft); letter-spacing:3px;
  font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:6px;
  opacity:0.85;
}

h1{
  font-family:'Amiri', serif;
  text-align:center;
  font-size:32px;
  color:var(--gold-soft);
  margin-bottom:6px;
  text-shadow:0 0 20px rgba(212,175,55,0.3);
}

.subtitle{
  text-align:center; color:rgba(244,236,216,0.65); font-size:14px; margin-bottom:28px;
}

/* ---- gate screen ---- */
.gate-input{
  width:100%;
  padding:16px 18px;
  border-radius:12px;
  border:1px solid rgba(212,175,55,0.4);
  background:rgba(255,255,255,0.05);
  color:var(--cream);
  font-family:'Cairo', sans-serif;
  font-size:18px;
  text-align:center;
  letter-spacing:2px;
  outline:none;
  margin-bottom:14px;
  transition:border-color .2s, box-shadow .2s;
}
.gate-input:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,175,55,0.15); }

.btn{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:none;
  font-family:'Cairo', sans-serif;
  font-weight:700;
  font-size:17px;
  cursor:pointer;
  background:linear-gradient(135deg, var(--gold), #a97e1f);
  color:#1a1207;
  transition:transform .15s, box-shadow .15s;
}
.btn:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(212,175,55,0.3); }
.btn:active{ transform:translateY(0); }
.btn:disabled{ opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

.msg{ text-align:center; font-size:14px; min-height:20px; margin-top:12px; font-weight:700; }
.msg.err{ color:var(--warn); }
.msg.ok{ color:var(--ok); }

/* ---- gem badge ---- */
.gem{
  width:22px; height:22px;
  display:inline-block;
  background:
    linear-gradient(135deg, var(--gem-1) 0%, var(--gem-2) 55%, var(--gem-3) 100%);
  clip-path:polygon(50% 0%, 85% 25%, 100% 65%, 50% 100%, 0% 65%, 15% 25%);
  box-shadow:0 0 10px rgba(60,140,255,0.7);
  vertical-align:middle;
  position:relative;
}
.gem::after{
  content:"";
  position:absolute; top:15%; left:28%;
  width:25%; height:18%;
  background:rgba(255,255,255,0.8);
  border-radius:50%;
  filter:blur(1px);
}
.gem-big{ width:64px; height:64px; }

.gem-counter{
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(126,200,255,0.3);
  border-radius:14px;
  padding:12px 18px;
  margin-bottom:24px;
}
.gem-counter .num{
  font-family:'Amiri', serif;
  font-size:24px;
  font-weight:700;
  color:var(--gem-1);
  text-shadow:0 0 12px rgba(126,200,255,0.5);
}

/* ---- quiz screen ---- */
.progress-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; font-size:13px; color:rgba(244,236,216,0.6); }
.progress-bar{ height:6px; border-radius:4px; background:rgba(255,255,255,0.08); overflow:hidden; margin-bottom:22px; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--gold), var(--gold-soft)); transition:width .3s; }

.timer-wrap{ text-align:center; margin-bottom:18px; }
.timer{
  display:inline-block;
  font-family:'Amiri', serif;
  font-size:34px;
  font-weight:700;
  color:var(--cream);
  transition:color .2s;
}
.timer.warning{ color:var(--warn); animation:pulse 0.6s infinite; }
.warning-label{
  display:block; color:var(--warn); font-weight:900; font-size:14px;
  letter-spacing:2px; margin-top:4px; height:18px; opacity:0; transition:opacity .2s;
}
.warning-label.show{ opacity:1; animation:pulse 0.6s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }

.question-text{
  font-family:'Amiri', serif;
  font-size:22px;
  text-align:center;
  line-height:1.6;
  margin-bottom:26px;
  min-height:80px;
  display:flex; align-items:center; justify-content:center;
}

.options{ display:flex; flex-direction:column; gap:12px; margin-bottom:10px; }
.option{
  padding:15px 18px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.03);
  color:var(--cream);
  font-family:'Cairo', sans-serif;
  font-size:16px;
  text-align:right;
  cursor:pointer;
  transition:all .15s;
}
.option:hover:not(:disabled){ border-color:var(--gold); background:rgba(212,175,55,0.08); }
.option:disabled{ cursor:default; }
.option.correct{ border-color:var(--ok); background:rgba(63,191,127,0.15); color:var(--ok); }
.option.wrong{ border-color:var(--warn); background:rgba(230,57,70,0.15); color:var(--warn); }

.feedback{ text-align:center; font-size:15px; font-weight:700; min-height:22px; margin:14px 0; }
.feedback.gain{ color:var(--gem-1); }
.feedback.miss{ color:var(--warn); }

/* ---- results screen ---- */
.result-icon{ display:flex; justify-content:center; margin-bottom:16px; }
.result-title{ font-family:'Amiri', serif; text-align:center; font-size:26px; color:var(--gold-soft); margin-bottom:8px; }
.result-sub{ text-align:center; color:rgba(244,236,216,0.7); font-size:14px; margin-bottom:26px; }
.result-stats{ display:flex; justify-content:center; gap:26px; margin-bottom:28px; }
.stat{ text-align:center; }
.stat .n{ font-family:'Amiri', serif; font-size:28px; color:var(--gold-soft); font-weight:700; }
.stat .l{ font-size:12px; color:rgba(244,236,216,0.55); margin-top:2px; }

.hidden{ display:none !important; }
</style>
</head>
<body>
<div class="stars"></div>

<!-- ============================================================= -->
<!-- شاشة الدخول بالباسورد -->
<!-- ============================================================= -->
<div class="card" id="gateScreen">
  <div class="eyebrow">مسابقه مدرسه الكتاب كنيسه السيده العذراء مريم و مارمرقس الرسول|RUSH&SMASH|</div>
  <h1>✝️ اهلاً بيك</h1>
  <p class="subtitle">اكتب الباسورد بتاعك عشان تدخل المسابقة</p>
  <input type="text" id="passwordInput" class="gate-input" placeholder="الباسورد" autocomplete="off">
  <button class="btn" id="enterBtn">ادخل المسابقة</button>
  <div class="msg" id="gateMsg"></div>
</div>

<!-- ============================================================= -->
<!-- شاشة الأسئلة -->
<!-- ============================================================= -->
<div class="card hidden" id="quizScreen">
  <div class="gem-counter">
    <span class="gem"></span>
    <span class="num" id="gemCount">0</span>
    <span style="font-size:13px; color:rgba(244,236,216,0.6);">جوهرة</span>
  </div>

  <div class="progress-row">
    <span id="qIndexLabel">سؤال 1 / 20</span>
    <span id="qScoreLabel">5 جواهر للإجابة الصح</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:5%"></div></div>

  <div class="timer-wrap">
    <span class="timer" id="timerText">20</span>
    <span class="warning-label" id="warningLabel">⚠️ الوقت قرب يخلص</span>
  </div>

  <div class="question-text" id="questionText">نص السؤال</div>
  <div class="options" id="optionsWrap"></div>
  <div class="feedback" id="feedback"></div>
</div>

<!-- ============================================================= -->
<!-- شاشة النتيجة -->
<!-- ============================================================= -->
<div class="card hidden" id="resultScreen">
  <div class="result-icon"><span class="gem gem-big"></span></div>
  <div class="result-title">خلصت المسابقة! 🎉</div>
  <div class="result-sub">ربنا يبارك تعبك</div>
  <div class="result-stats">
    <div class="stat"><div class="n" id="finalCorrect">0</div><div class="l">إجابات صح</div></div>
    <div class="stat"><div class="n" id="finalGemsRound">0</div><div class="l">جواهر جمعتها دلوقتي</div></div>
    <div class="stat"><div class="n" id="finalGemsTotal">0</div><div class="l">إجمالي الجواهر</div></div>
  </div>
  <button class="btn" id="restartBtn">رجوع لشاشة الدخول</button>
</div>

<script>
/* =====================================================================
   ١) الأسئلة — عدّل هنا براحتك
   كل سؤال: نص السؤال، 4 اختيارات، ورقم الاختيار الصح (0 = الأول، 3 = الرابع)
   ===================================================================== */
const QUESTIONS = [
  { q: "مين اللي بنى الفلك؟", options: ["نوح", "إبراهيم", "موسى", "داود"], correct: 0 },
  { q: "كام عدد أسباط بني إسرائيل؟", options: ["10", "12", "14", "7"], correct: 1 },
  { q: "في أي مدينة وُلد السيد المسيح؟", options: ["الناصرة", "أورشليم", "بيت لحم", "كفر ناحوم"], correct: 2 },
  { q: "مين أول شهيد في المسيحية؟", options: ["بولس", "اسطفانوس", "بطرس", "يوحنا"], correct: 1 },
  { q: "كام عدد تلاميذ السيد المسيح؟", options: ["10", "12", "7", "15"], correct: 1 },
  { q: "مين اللي أنكر المسيح ثلاث مرات؟", options: ["توما", "بطرس", "يهوذا", "فيلبس"], correct: 1 },
  { q: "في أي بحر عبر موسى وشعبه؟", options: ["البحر الأبيض", "البحر الأحمر", "بحر الجليل", "البحر الميت"], correct: 1 },
  { q: "مين اللي كتب سفر الرؤيا؟", options: ["يوحنا", "متى", "مرقس", "لوقا"], correct: 0 },
  { q: "كام يوم صام السيد المسيح في البرية؟", options: ["7 أيام", "30 يوم", "40 يوم", "3 أيام"], correct: 2 },
  { q: "مين والدة السيد المسيح؟", options: ["مريم المجدلية", "العذراء مريم", "أليصابات", "مرثا"], correct: 1 },
  { q: "مين اللي قتل أخوه هابيل؟", options: ["قايين", "حام", "لامك", "شيت"], correct: 0 },
  { q: "بنحتفل بقيامة السيد المسيح في عيد إيه؟", options: ["عيد الميلاد", "عيد الغطاس", "عيد القيامة", "عيد العنصرة"], correct: 2 },
  { q: "أول معجزة عملها السيد المسيح كانت في عرس قانا الجليل، وكانت تحويل إيه لخمر؟", options: ["الخبز", "الماء", "العصير", "اللبن"], correct: 1 },
  { q: "كام يوم خلق ربنا فيها العالم؟", options: ["5 أيام", "6 أيام", "7 أيام", "3 أيام"], correct: 1 },
  { q: "مين أشهر ملوك إسرائيل اللي اشتهر بالحكمة؟", options: ["شاول", "داود", "سليمان", "رحبعام"], correct: 2 },
  { q: "مين الملاك اللي بشّر العذراء مريم بميلاد السيد المسيح؟", options: ["ميخائيل", "غبريال", "رافائيل", "أورئيل"], correct: 1 },
  { q: "مين اللي خان السيد المسيح؟", options: ["توما", "متى", "يهوذا الإسخريوطي", "برثولماوس"], correct: 2 },
  { q: "في أي جبل استلم موسى الوصايا العشر؟", options: ["جبل سيناء", "جبل الزيتون", "جبل حوريب", "جبل الجلجثة"], correct: 0 },
  { q: "مين اللي اتلقى في جب الأسود وربنا نجاه؟", options: ["دانيال", "إرميا", "حزقيال", "إشعياء"], correct: 0 },
  { q: "مين اللي صنع سفينة (فلك) بأمر من ربنا عشان ينجو من الطوفان؟", options: ["إبراهيم", "نوح", "لوط", "يوسف"], correct: 1 },
];

/* =====================================================================
   ٢) الباسوردات — الخمسين باسورد. عدّل أو ضيف براحتك
   ===================================================================== */
const PASSWORDS = [
  "KENISA01","KENISA02","KENISA03","KENISA04","KENISA05",
  "KENISA06","KENISA07","KENISA08","KENISA09","KENISA10",
  "KENISA11","KENISA12","KENISA13","KENISA14","KENISA15",
  "KENISA16","KENISA17","KENISA18","KENISA19","KENISA20",
  "KENISA21","KENISA22","KENISA23","KENISA24","KENISA25",
  "KENISA26","KENISA27","KENISA28","KENISA29","KENISA30",
  "KENISA31","KENISA32","KENISA33","KENISA34","KENISA35",
  "KENISA36","KENISA37","KENISA38","KENISA39","KENISA40",
  "KENISA41","KENISA42","KENISA43","KENISA44","KENISA45",
  "KENISA46","KENISA47","KENISA48","KENISA49","KENISA50",
];

/* =====================================================================
   إعدادات عامة
   ===================================================================== */
const GEMS_PER_CORRECT = 5;
const TIME_PER_QUESTION = 20;
const WARNING_AT = 10;

const LS_USED_PASSWORDS = "kenisa_used_passwords";
const LS_TOTAL_GEMS = "kenisa_total_gems";

/* ---------------------------------------------------------------
   عناصر الشاشات
   --------------------------------------------------------------- */
const gateScreen = document.getElementById("gateScreen");
const quizScreen = document.getElementById("quizScreen");
const resultScreen = document.getElementById("resultScreen");

const passwordInput = document.getElementById("passwordInput");
const enterBtn = document.getElementById("enterBtn");
const gateMsg = document.getElementById("gateMsg");

const gemCountEl = document.getElementById("gemCount");
const qIndexLabel = document.getElementById("qIndexLabel");
const progressFill = document.getElementById("progressFill");
const timerText = document.getElementById("timerText");
const warningLabel = document.getElementById("warningLabel");
const questionText = document.getElementById("questionText");
const optionsWrap = document.getElementById("optionsWrap");
const feedback = document.getElementById("feedback");

const finalCorrect = document.getElementById("finalCorrect");
const finalGemsRound = document.getElementById("finalGemsRound");
const finalGemsTotal = document.getElementById("finalGemsTotal");
const restartBtn = document.getElementById("restartBtn");

let currentIndex = 0;
let roundGems = 0;
let correctCount = 0;
let totalGems = 0;
let timerInterval = null;
let timeLeft = TIME_PER_QUESTION;
let answered = false;

/* ---------------------------------------------------------------
   تخزين محلي (كل موبايل/متصفح بياخد رصيده لوحده)
   --------------------------------------------------------------- */
function getUsedPasswords(){
  try{
    return JSON.parse(localStorage.getItem(LS_USED_PASSWORDS)) || [];
  }catch(e){ return []; }
}
function markPasswordUsed(pw){
  const used = getUsedPasswords();
  if(!used.includes(pw)){
    used.push(pw);
    localStorage.setItem(LS_USED_PASSWORDS, JSON.stringify(used));
  }
}
function getTotalGems(){
  return parseInt(localStorage.getItem(LS_TOTAL_GEMS) || "0", 10);
}
function saveTotalGems(n){
  localStorage.setItem(LS_TOTAL_GEMS, String(n));
}

/* ---------------------------------------------------------------
   شاشة الدخول
   --------------------------------------------------------------- */
enterBtn.addEventListener("click", tryEnter);
passwordInput.addEventListener("keydown", (e)=>{ if(e.key === "Enter") tryEnter(); });

function tryEnter(){
  const pw = passwordInput.value.trim().toUpperCase();
  if(!pw){
    showGateMsg("اكتب الباسورد الأول", true);
    return;
  }
  if(!PASSWORDS.includes(pw)){
    showGateMsg("الباسورد ده مش صح", true);
    return;
  }
  const used = getUsedPasswords();
  if(used.includes(pw)){
    showGateMsg("الباسورد ده استخدم قبل كده، لازم باسورد تاني", true);
    return;
  }
  // باسورد صح ومش مستخدم -> نسجله كمستخدم فورا
  markPasswordUsed(pw);
  showGateMsg("اهلا بيك! يلا نبدأ 🙏", false);
  setTimeout(startQuiz, 500);
}

function showGateMsg(text, isError){
  gateMsg.textContent = text;
  gateMsg.className = "msg " + (isError ? "err" : "ok");
}

/* ---------------------------------------------------------------
   بداية المسابقة
   --------------------------------------------------------------- */
function startQuiz(){
  currentIndex = 0;
  roundGems = 0;
  correctCount = 0;
  totalGems = getTotalGems();
  gemCountEl.textContent = totalGems;

  gateScreen.classList.add("hidden");
  resultScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");

  showQuestion();
}

function showQuestion(){
  answered = false;
  feedback.textContent = "";
  feedback.className = "feedback";
  warningLabel.classList.remove("show");

  const total = QUESTIONS.length;
  const item = QUESTIONS[currentIndex];

  qIndexLabel.textContent = `سؤال ${currentIndex+1} / ${total}`;
  progressFill.style.width = `${((currentIndex)/total)*100}%`;
  questionText.textContent = item.q;

  optionsWrap.innerHTML = "";
  item.options.forEach((opt, i)=>{
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.addEventListener("click", ()=> selectAnswer(i));
    optionsWrap.appendChild(btn);
  });

  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  timeLeft = TIME_PER_QUESTION;
  timerText.textContent = timeLeft;
  timerText.classList.remove("warning");

  timerInterval = setInterval(()=>{
    timeLeft--;
    timerText.textContent = timeLeft;

    if(timeLeft <= WARNING_AT && timeLeft > 0){
      timerText.classList.add("warning");
      warningLabel.classList.add("show");
    }
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      if(!answered) selectAnswer(-1); // وقت خلص من غير إجابة
    }
  }, 1000);
}

function selectAnswer(choiceIndex){
  if(answered) return;
  answered = true;
  clearInterval(timerInterval);

  const item = QUESTIONS[currentIndex];
  const options = optionsWrap.querySelectorAll(".option");
  options.forEach((btn, i)=>{
    btn.disabled = true;
    if(i === item.correct) btn.classList.add("correct");
    else if(i === choiceIndex) btn.classList.add("wrong");
  });

  if(choiceIndex === item.correct){
    correctCount++;
    roundGems += GEMS_PER_CORRECT;
    totalGems += GEMS_PER_CORRECT;
    saveTotalGems(totalGems);
    gemCountEl.textContent = totalGems;
    feedback.textContent = `إجابة صح! +${GEMS_PER_CORRECT} جوهرة 💎`;
    feedback.className = "feedback gain";
  } else if(choiceIndex === -1){
    feedback.textContent = "خلص الوقت ⏰";
    feedback.className = "feedback miss";
  } else {
    feedback.textContent = "إجابة غلط";
    feedback.className = "feedback miss";
  }

  setTimeout(nextQuestion, 1400);
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex >= QUESTIONS.length){
    showResults();
  } else {
    showQuestion();
  }
}

function showResults(){
  quizScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");
  progressFill.style.width = "100%";

  finalCorrect.textContent = `${correctCount} / ${QUESTIONS.length}`;
  finalGemsRound.textContent = roundGems;
  finalGemsTotal.textContent = totalGems;
}

restartBtn.addEventListener("click", ()=>{
  resultScreen.classList.add("hidden");
  gateScreen.classList.remove("hidden");
  passwordInput.value = "";
  gateMsg.textContent = "";
});
</script>
</body>
</html>
