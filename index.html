<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Gate - بوابة اللانهاية</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
  body {
    background: #050010;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(255, 0, 255, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 50%, rgba(255, 0, 170, 0.1) 0%, transparent 50%);
    overflow-x: hidden;
  }
.container {
    width: 95%;
    max-width: 650px;
    background: rgba(15, 0, 30, 0.95);
    border: 3px solid #ff00ff;
    border-radius: 25px;
    padding: 35px 25px;
    box-shadow: 0 0 40px #ff00ff, 0 0 80px #ff00aa;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  h1 {
    color: #ff00ff;
    text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00aa, 0 0 45px #ff0066;
    margin-bottom: 25px;
    font-size: 2.4em;
    font-weight: 900;
    letter-spacing: 2px;
  }
.score-box {
    background: linear-gradient(135deg, #1a0033, #2a0055);
    border: 2px solid #ff00aa;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 25px;
    font-size: 1.4em;
    color: #ff88ff;
    box-shadow: 0 0 20px #ff00aa inset;
    font-weight: 700;
  }
.timer {
    font-size: 1.8em;
    color: #ff0066;
    margin: 20px 0;
    text-shadow: 0 0 15px #ff0066, 0 0 30px #ff00ff;
    font-weight: 900;
    display: none;
  }
.timer.warning {
    color: #ffaa00;
    animation: blink 0.5s infinite;
  }
  @keyframes blink {
    50% { opacity: 0.3; }
  }
.question {
    font-size: 1.5em;
    margin: 30px 0;
    color: #fff;
    min-height: 90px;
    line-height: 1.6;
    font-weight: 700;
  }
.options button {
    width: 100%;
    background: linear-gradient(135deg, #1a0033, #2a0055);
    border: 2px solid #ff00aa;
    color: #ffbbff;
    padding: 18px;
    margin: 10px 0;
    border-radius: 15px;
    font-size: 1.15em;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 600;
  }
.options button:hover:not(:disabled) {
    background: linear-gradient(135deg, #ff00ff, #ff00aa);
    color: #050010;
    box-shadow: 0 0 25px #ff00ff;
    transform: translateY(-3px);
  }
.options button:disabled { cursor: not-allowed; }
.options button.correct {
    background: linear-gradient(135deg, #00ff88, #00cc66);
    color: #000;
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88;
  }
.options button.wrong {
    background: linear-gradient(135deg, #ff0044, #cc0033);
    color: #fff;
    border-color: #ff0044;
    box-shadow: 0 0 25px #ff0044;
  }
.start-btn {
    background: linear-gradient(135deg, #ff00ff, #ff00aa);
    color: #050010;
    border: none;
    padding: 18px 50px;
    font-size: 1.4em;
    border-radius: 18px;
    cursor: pointer;
    margin-top: 25px;
    box-shadow: 0 0 30px #ff00ff;
    font-weight: 900;
    transition: 0.3s;
  }
.start-btn:hover {
    box-shadow: 0 0 50px #ff00ff;
    transform: scale(1.05);
  }
.hidden { display: none; }
.result {
    font-size: 1.7em;
    color: #ff88ff;
    margin-top: 25px;
    font-weight: 700;
    text-shadow: 0 0 15px #ff00ff;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 40px #ff00ff, 0 0 80px #ff00aa; }
    50% { box-shadow: 0 0 60px #ff0066, 0 0 120px #ff0044; }
    100% { box-shadow: 0 0 40px #ff00ff, 0 0 80px #ff00aa; }
  }
.infinity-mode { animation: pulse 0.8s infinite; border-color: #ff0066; }
.q-number {
    color: #ff00aa;
    font-size: 0.9em;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="container" id="quiz-box">
  <h1>INFINITY GATE<br>بوابة اللانهاية</h1>

  <div class="score-box hidden" id="score-box">السكور: <span id="score">0</span> / 20</div>
  <div class="timer" id="timer">⏱ 30</div>
  <div class="q-number hidden" id="q-number"></div>
  <div class="question hidden" id="question"></div>
  <div class="options hidden" id="options"></div>

  <div id="start-screen">
    <p style="color:#ff88ff; margin:25px 0; font-size:1.3em; line-height:1.8;">
      تحدي بوابة اللانهاية<br>
      20 سؤال مستوى صعب<br>
      10 أسئلة كنسية عميقة + 10 معلومات عامة تقيلة<br>
      كل سؤال 30 ثانية! والسؤال 20 سؤال اللانهاية
    </p>
    <button class="start-btn" onclick="startQuiz()">ابدأ التحدي</button>
  </div>

  <div class="result hidden" id="result"></div>
</div>
<script>
const questions = [
  // 10 أسئلة كنسية - أصعب
  {q: "مين قال 'ليس بالخبز وحده يحيا الإنسان؟", a: ["يسوع", "موسى - فرعون", "إيليا - أخاب", "بطرس - حنانيا"], correct: 0},
  {q: "سفر الرؤيا اتكتب في أي جزيرة؟", a: ["كريت", "قبرص", "بطمس", "مالطا"], correct: 2},
  {q: "مين من الرسل كان 'ابن قانا' أو 'القانوي'؟", a: ["متى", "سمعان الغيور", "يعقوب الصغير", "برثولماوس"], correct: 1},
  {q: "المجمع المسكوني الأول في نيقية سنة 325 حرم مين؟", a: ["أوريجانوس", "أريوس", "نسطور", "مقدونيوس"], correct: 1},
  {q: "مين اللي قال 'ها أنا معكم كل الأيام إلى انقضاء الدهر'؟", a: ["الملاك جبرائيل", "يسوع المسيح", "القديس بطرس", "القديس بولس"], correct: 1},
  {q: "كم مرة صامها السيد المسيح في الأناجيل؟ مرتين، امتى؟", a: ["مرة واحدة 40 يوم", "مرتين: الميلاد والعماد", "مرتين: بعد الميلاد وقبل الخدمة", "3 مرات"], correct: 2},
  {q: "القديس مرقس كتب إنجيله لمين؟", a: ["اليهود", "الرومان", "اليونانيين", "المصريين"], correct: 1},
  {q: "مين اللي قال 'يا أورشليم يا أورشليم يا قاتلة الأنبياء'؟", a: ["إرميا", "إشعياء", "يسوع", "يوحنا المعمدان"], correct: 2},
  {q: "الليتورجيا الغريغورية بتتصلى امتى في الكنيسة القبطية؟", a: ["الأحد", "الأربعاء والجمعة", "الصوم الكبير", "الأعياد السيدية"], correct: 2},
  {q: "مين أول شهيد في المسيحية؟", a: ["يعقوب أخو الرب", "استفانوس", "بولس", "بطرس"], correct: 1},

  // 10 معلومات عامة - أصعب
  {q: "أي عنصر لو أكلته بكميات كبيرة يخليك تتوهج في الضلمة؟", a: ["اليورانيوم", "الفوسفور", "الراديوم", "السيزيوم"], correct: 1},
  {q: "مين العالم اللي قال 'الله لا يلعب بالنرد'؟", a: ["نيوتن", "آينشتاين", "هوكينج", "بوهر"], correct: 1},
  {q: "أقصر حرب في التاريخ كانت بين مين ومين وطولها كام؟", a: ["بريطانيا وزنجبار - 38 دقيقة", "فرنسا وألمانيا - يومين", "مصر وإسرائيل - 6 ساعات", "أمريكا وكندا - ساعة"], correct: 0},
  {q: "العدد الأولي اللي بعد 997 كام؟", a: ["1001", "1007", "1009", "1013"], correct: 2},
  {q: "مين اخترع الواي فاي؟", a:["ماركوني", "فريق من CSIRO أستراليا", "تسلا", "جراهام بيل"], correct: 1},
  {q: "أعمق نقطة في المحيط اسمها ايه وعمقها كام؟", a: ["خندق ماريانا - 11كم", "خندق بورتوريكو - 8كم", "خندق اليابان - 10كم", "خندق سوندا - 7كم"], correct: 0},
  {q: "لغة الباسك Basque بتتكلم فين ومش من عيلة أي لغة؟", a: ["إسبانيا/فرنسا - لغة معزولة", "روسيا - سلافية", "الهند - هندية", "أفريقيا - نيلية"], correct: 0},
  {q: "مين رسم 'ليلة النجوم' The Starry Night؟", a: ["دافنشي", "فان جوخ", "مونيه", "دالي"], correct: 1},
  {q: "سنة 1752 اتشال كام يوم من التقويم في بريطانيا؟", a: ["5 أيام", "11 يوم", "15 يوم", "مفيش أيام اتشالت"], correct: 1},
  // سؤال اللانهاية - الأخير
  {q: "سؤال اللانهاية: أنا الرقم اللي لو ضربتني في نفسي وطرحت مني نفسي، هتطلع صفر. مين أنا؟", a: ["0", "1", "2", "10"], correct: 1, infinity: true}
];

let currentQ = 0;
let score = 0;
let timer;
let timeLeft = 30;

function startQuiz() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('score-box').classList.remove('hidden');
  document.getElementById('q-number').classList.remove('hidden');
  document.getElementById('question').classList.remove('hidden');
  document.getElementById('options').classList.remove('hidden');
  document.getElementById('timer').style.display = 'block'; // <-- هنا السر: بنظهر التايمر
  showQuestion();
}

function showQuestion() {
  clearInterval(timer);
  timeLeft = 30;

  const q = questions[currentQ];
  document.getElementById('q-number').textContent = `السؤال ${currentQ+1} من 20`;
  document.getElementById('question').textContent = q.q;

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';

  // السؤال الأخير بس ياخد النيون الأحمر
  if(q.infinity) {
    document.getElementById('quiz-box').classList.add('infinity-mode');
  } else {
    document.getElementById('quiz-box').classList.remove('infinity-mode');
  }

  startTimer();

  q.a.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(i, btn);
    optionsDiv.appendChild(btn);
  });
}

function startTimer() {
  const timerEl = document.getElementById('timer');
  timerEl.textContent = `⏱ ${timeLeft}`;
  timerEl.classList.remove('warning');

  timer = setInterval(() => {
    timeLeft--;
    timerEl.textContent = `⏱ ${timeLeft}`;
    if(timeLeft <= 10) timerEl.classList.add('warning');
    if(timeLeft <= 0) {
      clearInterval(timer);
      nextQuestion(false);
    }
  }, 1000);
}

function checkAnswer(selected, btn) {
  clearInterval(timer);
  const correct = questions[currentQ].correct;
  const buttons = document.querySelectorAll('.options button');

  buttons.forEach((b, i) => {
    b.disabled = true;
    if(i === correct) b.classList.add('correct');
    else if(i === selected) b.classList.add('wrong');
  });

  if(selected === correct) {
    score++;
    document.getElementById('score').textContent = score;
  }

  setTimeout(nextQuestion, 1800);
}

function nextQuestion() {
  currentQ++;
  if(currentQ < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  clearInterval(timer);
  document.getElementById('q-number').classList.add('hidden');
  document.getElementById('question').classList.add('hidden');
  document.getElementById('options').classList.add('hidden');
  document.getElementById('timer').style.display = 'none';
  document.getElementById('quiz-box').classList.remove('infinity-mode');

  let msg = `انتهى التحدي! سكورك النهائي: ${score}/20<br>`;
  if(score >= 18) msg += "🔥 أسطورة بوابة اللانهاية! محدش قدك";
  else if(score >= 15) msg += "⚡ وحش! قربت تختم البوابة";
  else if(score >= 12) msg += "💪 جامد! بس لسه قدامك";
  else msg += "💀 البوابة قفلت";

  document.getElementById('result').innerHTML = msg;
  document.getElementById('result').classList.remove('hidden');
}
</script>
</body>
</html>
